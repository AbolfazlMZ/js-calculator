<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator - AbolfazlMZ</title>
    
    <link rel="icon" href="./assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css" />
    <script src="./main.js" defer></script>
  </head>

  <body>

    <div id="calculator">

      <!-- OUTPUT -->
        <div id="output">
            <input type="text" id="display" readonly placeholder="0">
        </div>

        <!-- BUTTONS -->
        <div class="button-container">
          <button type="button" class="btn" data-btn="c">C</button>
          <button type="button" class="btn" data-btn="delete">DEL</button>
          <button type="button" class="btn operator" data-btn="%">%</button>
          <button type="button" class="btn operator" data-btn="/">/</button>

          <button type="button" class="btn" data-btn="7">7</button>
          <button type="button" class="btn" data-btn="8">8</button>
          <button type="button" class="btn" data-btn="9">9</button>
          <button type="button" class="btn operator" data-btn="*">*</button>

          <button type="button" class="btn" data-btn="4">4</button>
          <button type="button" class="btn" data-btn="5">5</button>
          <button type="button" class="btn" data-btn="6">6</button>
          <button type="button" class="btn operator" data-btn="-">-</button>

          <button type="button" class="btn" data-btn="1">1</button>
          <button type="button" class="btn" data-btn="2">2</button>
          <button type="button" class="btn" data-btn="3">3</button>
          <button type="button" class="btn operator" data-btn="+">+</button>

          <button type="button" class="btn" data-btn=".">.</button>
          <button type="button" class="btn" data-btn="0">0</button>
          <button type="button" class="btn operator equal" data-btn="=">=</button>
        </div>

    </div>

  </body>
</html>
